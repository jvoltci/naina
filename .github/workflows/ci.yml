name: CI

on:
  push:
    branches: [master, main]
    paths-ignore:
      - 'demo/**'
      - 'docs/**'
      - '*.md'
  pull_request:
    paths-ignore:
      - 'demo/**'
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.preset }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  preset: linux-x86_64,       cc: gcc,   cxx: g++ }
          - { os: ubuntu-latest,  preset: linux-x86_64-debug, cc: clang, cxx: clang++ }
          - { os: macos-14,       preset: macos-arm64,        cc: clang, cxx: clang++ }

    runs-on: ${{ matrix.os }}
    env:
      CC: ${{ matrix.cc }}
      CXX: ${{ matrix.cxx }}
      CMAKE_GENERATOR: Ninja

    steps:
      - uses: actions/checkout@v4

      - name: Install build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake libyaml-cpp-dev libcurl4-openssl-dev

      - name: Install build deps (macOS)
        if: runner.os == 'macOS'
        # libcurl ships with macOS; nothing extra to install for it.
        run: brew install ninja cmake yaml-cpp

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        run: ctest --preset ${{ matrix.preset == 'macos-arm64' && 'macos-arm64' || 'linux-x86_64' }}
        continue-on-error: false

  format:
    name: clang-format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install clang-format (pinned via pip wheel)
        # pip's clang-format ships the upstream LLVM binary; pinning the version
        # makes local and CI deterministic.
        run: pip install clang-format==19.1.4
      - name: Check formatting
        run: |
          mapfile -t files < <(git ls-files 'core/**/*.h' 'core/**/*.hpp' 'core/**/*.cc' 'core/**/*.c')
          if [ ${#files[@]} -gt 0 ]; then
            clang-format --version
            clang-format --dry-run --Werror "${files[@]}"
          fi

  python:
    name: python ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake libyaml-cpp-dev libcurl4-openssl-dev
      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja cmake yaml-cpp

      - name: pip install naina
        # Plain install (not editable) so it runs through the full sdist path
        # the way end-users would.
        run: pip install -v .

      - name: Smoke tests
        run: |
          pip install pytest numpy
          python -m pytest bindings/python/tests/ -v

  node:
    name: node ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: bindings/node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: bindings/node/package-lock.json

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake libyaml-cpp-dev libcurl4-openssl-dev
      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja cmake yaml-cpp

      - name: npm install
        run: npm install --no-audit --no-fund

      - name: Build native + ts
        run: npm run build

      - name: Test
        run: npx vitest run

  manifest-schema:
    name: validate model registry
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Install validators
        run: pip install jsonschema pyyaml
      - name: Validate models/registry.yaml
        run: |
          python - <<'PY'
          import json, yaml, sys
          from jsonschema import Draft202012Validator
          schema = json.load(open('models/manifest.schema.json'))
          data   = yaml.safe_load(open('models/registry.yaml'))
          errs = sorted(Draft202012Validator(schema).iter_errors(data),
                        key=lambda e: list(e.path))
          if errs:
              for e in errs:
                  print(f"  • {'/'.join(str(p) for p in e.path) or '<root>'}: {e.message}")
              sys.exit(1)
          print("registry.yaml validates")
          PY
